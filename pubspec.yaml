name: uai_capoeira
description: "Sistema de gestão para academia de capoeira UAI CAPOEIRA"
publish_to: 'none'
version: 2.0.59+1

# =============================================
# 🔧 VERSÕES DO SDK
# =============================================
environment:
  sdk: ">=3.10.8 <4.0.0"
  flutter: ">=3.22.0"

# =============================================
# 📦 DEPENDÊNCIAS PRINCIPAIS (PRODUÇÃO)
# =============================================
dependencies:
  # 🌍 FLUTTER SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # =============================================
  # 🔥 FIREBASE (Backend completo)
  # =============================================
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.2.4
  firebase_app_check: ^0.3.2+1
  firebase_analytics: ^11.3.0
  cloud_functions: ^5.0.0

  # 🔐 Login com Google
  google_sign_in: ^6.1.5
  shared_preferences: ^2.3.3

  # =============================================
  # 🎨 INTERFACE E ANIMAÇÕES
  # =============================================
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  confetti: ^0.7.0
  flutter_colorpicker: ^1.1.0

  # =============================================
  # 📄 MANIPULAÇÃO DE DOCUMENTOS
  # =============================================
  pdf: ^3.10.7
  printing: ^5.11.1
  flutter_pdfview: ^1.3.2
  file_saver: ^0.2.14
  excel: ^2.0.0
  csv: ^6.0.0
  xml: ^6.3.0
  archive: ^3.4.10

  # =============================================
  # 🖼️ IMAGENS E ARQUIVOS
  # =============================================
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  file_picker: ^8.1.2
  flutter_cache_manager: ^3.3.0

  # =============================================
  # 🌐 INTERNET E REDE
  # =============================================
  http: ^1.2.1
  connectivity_plus: ^6.0.0
  webview_flutter: ^4.7.0
  universal_html: ^2.2.4

  # =============================================
  # 📁 ARQUIVOS E PERMISSÕES
  # =============================================
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  open_filex: ^4.4.0

  # =============================================
  # 📱 INFORMAÇÕES DO DISPOSITIVO
  # =============================================
  package_info_plus: ^8.0.0
  device_info_plus: ^9.1.0

  # =============================================
  # 📅 DATAS E FORMATAÇÃO
  # =============================================
  intl: ^0.20.2

  # =============================================
  # 🔗 INTEGRAÇÕES
  # =============================================
  url_launcher: ^6.3.0
  share_plus: ^10.0.0

  # =============================================
  # 🔔 NOTIFICAÇÕES
  # =============================================
  flutter_local_notifications: ^17.2.0

  # =============================================
  # 📊 GRÁFICOS
  # =============================================
  fl_chart: ^0.68.0

  # =============================================
  # 🛠️ UTILITÁRIOS
  # =============================================
  collection: ^1.18.0
  async: ^2.11.0
  uuid: ^4.4.0

  # =============================================
  # 📊 GOOGLE SHEETS (Integração)
  # =============================================
  googleapis: ^13.0.0
  googleapis_auth: ^1.5.0

  # =============================================
  # 💾 BANCO DE DADOS LOCAL (Offline)
  # =============================================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

# =============================================
# 🛠️ DEPENDÊNCIAS DE DESENVOLVIMENTO
# =============================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.1.7
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

# =============================================
# 🎨 CONFIGURAÇÃO DO FLUTTER
# =============================================
flutter:
  uses-material-design: true

  # 📁 ARQUIVOS ESTÁTICOS
  assets:
    # 🖼️ Imagens
    - assets/images/
    - assets/certificados/
    - assets/fontes/
    - assets/images/fundo_aniversario_app_flutter.png
    - assets/images/logo_uai.png
    - assets/images/google_logo.png
    - assets/logoprincipal.png
    - assets/images/logo_uai_tema.svg
    - assets/logo_uai_tema_seguro.svg
    - assets/uai_capoeira_logo.svg

    # 📊 Dados de migração
    - assets/dadosalunos.csv
    - assets/alunos.json
    - assets/log_presenca_alunos_1.json
    - assets/log_presenca_alunos_2.json
    - assets/log_presenca_alunos_3.json
    - assets/eventos.json
    - assets/participacao_alunos_eventos.json
    - assets/graduacoes.csv

    # 🔑 Credenciais
    - assets/credentials.json

  # 🔤 FONTES DO APP / CERTIFICADOS
  #
  # IMPORTANTE:
  # - A fonte Sitka foi removida porque não existe mais em assets/fontes.
  # - As famílias abaixo podem ser usadas por TextStyle(fontFamily: "...").
  # - No PDF direto, estes mesmos arquivos também podem ser carregados por asset path.
  fonts:
    - family: Arial
      fonts:
        - asset: assets/fontes/arial.ttf
        - asset: assets/fontes/arialbd.ttf
          weight: 700
        - asset: assets/fontes/ariali.ttf
          style: italic
        - asset: assets/fontes/arialbi.ttf
          weight: 700
          style: italic

    - family: ArialNarrow
      fonts:
        - asset: assets/fontes/ARIALN.TTF
        - asset: assets/fontes/ARIALNB.TTF
          weight: 700
        - asset: assets/fontes/ARIALNI.TTF
          style: italic
        - asset: assets/fontes/ARIALNBI.TTF
          weight: 700
          style: italic

    - family: ArialRounded
      fonts:
        - asset: assets/fontes/ARLRDBD.TTF
          weight: 700

    - family: ArialBlack
      fonts:
        - asset: assets/fontes/ariblk.ttf
          weight: 900

    - family: Square721BT
      fonts:
        - asset: assets/fontes/Square721 BT Roman.ttf
        - asset: assets/fontes/Square721 BT Bold.ttf
          weight: 700

    - family: Square721CnBT
      fonts:
        - asset: assets/fontes/Square721 Cn BT Roman.ttf
        - asset: assets/fontes/Square721 Cn BT Bold.ttf
          weight: 700

    - family: EngraversGothicBT
      fonts:
        - asset: assets/fontes/EngraversGothic BT.ttf

    - family: AngelinaMalika
      fonts:
        - asset: assets/fontes/Angelina Malika Personal Use.ttf

    - family: Autography
      fonts:
        - asset: assets/fontes/Autography.otf

    - family: Bigtimes
      fonts:
        - asset: assets/fontes/Bigtimes.otf

    - family: PhotographSignature
      fonts:
        - asset: assets/fontes/Photograph Signature.ttf

# =============================================
# 🎨 CONFIGURAÇÃO DE ÍCONES DO APP
# =============================================
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#B71C1C"
    theme_color: "#B71C1C"
  image_path: "assets/images/logo_uai.png"
  adaptive_icon_background: "#B71C1C"
  adaptive_icon_foreground: "assets/images/logo_uai.png"
  min_sdk_android: 21
