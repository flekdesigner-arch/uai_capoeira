name: uai_capoeira
description: "Sistema de gestão para academia de capoeira UAI CAPOEIRA"
publish_to: 'none'
version: 2.0.34+1

# =============================================
# 🔧 VERSÕES DO SDK
# =============================================
environment:
  sdk: ">=3.10.8 <4.0.0"  # Versão do Dart
  flutter: ">=3.22.0"     # Versão do Flutter

# =============================================
# 📦 DEPENDÊNCIAS PRINCIPAIS (PRODUÇÃO)
# =============================================
dependencies:
  # 🌍 FLUTTER SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter      # Tradução do app (português, inglês, etc)

  # =============================================
  # 🔥 FIREBASE (Backend completo)
  # =============================================
  firebase_core: ^3.5.0               # 🧠 NÚCLEO - Obrigatório para qualquer serviço Firebase
  firebase_auth: ^5.3.0               # 🔐 Autenticação (email/senha, Google, etc)
  cloud_firestore: ^5.0.1             # 📊 Banco de dados NoSQL (onde ficam alunos, eventos, etc)
  firebase_storage: ^12.0.1           # 📁 Armazenamento de arquivos (fotos, PDFs, vídeos)
  firebase_messaging: ^15.2.4         # 🔔 Notificações push (avisos de eventos, mensagens)
  firebase_app_check: ^0.3.2+1        # 🛡️ Segurança extra contra bots e ataques
  firebase_analytics: ^11.3.0         # 📈 Estatísticas de uso do app
  cloud_functions: ^5.0.0             # ⚡ Funções serverless (regras de negócio no backend)

  # 🔐 Login com Google
  google_sign_in: ^6.1.5              # 🅱️ Botão "Entrar com Google"

  # =============================================
  # 🎨 INTERFACE E ANIMAÇÕES
  # =============================================
  cupertino_icons: ^1.0.8             # 🍎 Ícones no estilo iOS
  flutter_svg: ^2.0.10+1              # 🖼️ Mostrar imagens SVG (logo vetorizada)
  shimmer: ^3.0.0                     # ✨ Efeito de brilho (loading skeleton do Facebook)
  flutter_animate: ^4.5.0             # 🎬 Animações fáceis (fade, slide, scale)
  animations: ^2.0.11                 # 🎪 Animações prontas (transições entre telas)
  confetti: ^0.7.0                    # 🎉 Chuva de confetes (celebrações)
  flutter_colorpicker: ^1.1.0         # 🎨 Seletor de cores (personalização)

  # =============================================
  # 📄 MANIPULAÇÃO DE DOCUMENTOS
  # =============================================
  pdf: ^3.10.7                        # 📑 Criar arquivos PDF (certificados, relatórios)
  printing: ^5.11.1                   # 🖨️ Imprimir documentos direto do app
  flutter_pdfview: ^1.3.2             # 👁️ Visualizar PDF dentro do app
  excel: ^2.0.0                       # 📊 Criar/ler planilhas Excel (relatórios)
  csv: ^6.0.0                         # 📋 Manipular arquivos CSV (importar/exportar dados)
  xml: ^6.3.0                         # 📄 Ler arquivos XML
  archive: ^3.4.10                    # 📦 Criar/extrair arquivos ZIP

  # =============================================
  # 🖼️ IMAGENS E ARQUIVOS
  # =============================================
  image_picker: ^1.1.2                # 📸 Tirar foto ou escolher da galeria
  cached_network_image: ^3.3.1        # 🖼️ Carregar imagens da internet com cache
  file_picker: ^8.1.2                 # 📂 Selecionar arquivos do celular
  flutter_cache_manager: ^3.3.0       # 💾 Cache de arquivos em geral

  # =============================================
  # 🌐 INTERNET E REDE
  # =============================================
  http: ^1.2.1                        # 🌍 Fazer requisições HTTP (APIs externas)
  connectivity_plus: ^6.0.0           # 📶 Verificar se tem internet (WiFi/4G/5G)
  webview_flutter: ^4.7.0             # 🌐 Abrir páginas web dentro do app
  universal_html: ^2.2.4

  # =============================================
  # 📁 ARQUIVOS E PERMISSÕES
  # =============================================
  path_provider: ^2.1.3               # 📍 Descobrir pastas do sistema (Documentos, Cache)
  permission_handler: ^11.3.1         # 🔓 Pedir permissões (câmera, armazenamento)
  open_filex: ^4.4.0                  # 📂 Abrir arquivos em outros apps

  # =============================================
  # 📱 INFORMAÇÕES DO DISPOSITIVO
  # =============================================
  package_info_plus: ^8.0.0           # 📦 Info do app (versão, nome do pacote)
  device_info_plus: ^9.1.0            # 📱 Info do celular (modelo, Android/iOS)

  # =============================================
  # 📅 DATAS E FORMATAÇÃO
  # =============================================
  intl: ^0.20.2                       # 📆 Formatar datas, números, moedas (R$)

  # =============================================
  # 🔗 INTEGRAÇÕES
  # =============================================
  url_launcher: ^6.3.0                # 🔗 Abrir links (WhatsApp, telefone, email, maps)
  share_plus: ^10.0.0                 # 📤 Compartilhar conteúdo (texto, imagens)

  # =============================================
  # 🔔 NOTIFICAÇÕES
  # =============================================
  flutter_local_notifications: ^17.2.0  # 🔔 Notificações locais (lembretes agendados)

  # =============================================
  # 📊 GRÁFICOS
  # =============================================
  fl_chart: ^0.68.0                   # 📈 Gráficos (linha, barra, pizza)

  # =============================================
  # 🛠️ UTILITÁRIOS
  # =============================================
  collection: ^1.18.0                 # 🧰 Funções extras para Listas/Mapas
  async: ^2.11.0                      # ⏳ Programação assíncrona avançada
  uuid: ^4.4.0                        # 🎫 Gerar IDs únicos

  # =============================================
  # 📊 GOOGLE SHEETS (Integração)
  # =============================================
  googleapis: ^13.0.0                 # 📊 API do Google (Sheets, Drive, etc)
  googleapis_auth: ^1.5.0             # 🔑 Autenticar com APIs do Google

  # =============================================
  # 💾 BANCO DE DADOS LOCAL (Offline)
  # =============================================
  hive: ^2.2.3                        # 📦 Banco NoSQL local (cache offline)
  hive_flutter: ^1.1.0                # 🔌 Integração do Hive com Flutter

# =============================================
# 🛠️ DEPENDÊNCIAS DE DESENVOLVIMENTO
# =============================================
dev_dependencies:
  flutter_test:
    sdk: flutter                      # 🧪 Testes unitários
  flutter_lints: ^6.0.0               # 📏 Boas práticas de código
  image: ^4.1.7                       # 🖼️ Manipular imagens (gerar ícones)
  flutter_launcher_icons: ^0.14.1     # 🎨 Gerar ícones do app

# =============================================
# 🎨 CONFIGURAÇÃO DO FLUTTER
# =============================================
flutter:
  uses-material-design: true

  # 📁 ARQUIVOS ESTÁTICOS
  assets:
    # 🖼️ Imagens
    - assets/images/
    - assets/images/fundo_aniversario_app_flutter.png
    - assets/images/logo_uai.png
    - assets/images/google_logo.png

    # 📊 Dados de migração
    - assets/dadosalunos.csv
    - assets/alunos.json
    - assets/log_presenca_alunos_1.json
    - assets/log_presenca_alunos_2.json
    - assets/log_presenca_alunos_3.json
    - assets/eventos.json
    - assets/participacao_alunos_eventos.json
    - assets/graduacoes.csv

    # 🔑 Credenciais
    - assets/credentials.json

# =============================================
# 🎨 CONFIGURAÇÃO DE ÍCONES DO APP
# =============================================
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    background_color: "#B71C1C"
    theme_color: "#B71C1C"
  image_path: "assets/images/logo_uai.png"
  adaptive_icon_background: "#B71C1C"
  adaptive_icon_foreground: "assets/images/logo_uai.png"
  min_sdk_android: 21