<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="SITE DO GRUPO UAI CAPOEIRA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>UAI CAPOEIRA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #B71C1C;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
            animation: bgTransition 3s ease-in-out forwards; /* Agora em 3 segundos */
        }

        @keyframes bgTransition {
            0% {
                background-color: #B71C1C; /* Vermelho UAI */
            }
            33% {
                background-color: #8B1A1A; /* Vermelho mais escuro */
            }
            66% {
                background-color: #2C0707; /* Quase preto */
            }
            100% {
                background-color: #000000; /* Preto puro */
            }
        }

        .logo-container {
            width: 80%;
            max-width: 500px;
            animation: pulse 1.5s ease-in-out infinite;
            margin-bottom: 30px;
            position: relative;
        }

        /* Animação de pulsação */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Loading em barras verticais */
        .loading-bars {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 50px;
        }

        .bar {
            width: 8px;
            height: 20px;
            background: linear-gradient(180deg, #FFD700 0%, #C0C0C0 50%, #CD7F32 100%);
            border-radius: 4px;
            animation: barPulse 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { animation-delay: 0s; height: 30px; }
        .bar:nth-child(2) { animation-delay: 0.2s; height: 45px; }
        .bar:nth-child(3) { animation-delay: 0.4s; height: 60px; }
        .bar:nth-child(4) { animation-delay: 0.6s; height: 45px; }
        .bar:nth-child(5) { animation-delay: 0.8s; height: 30px; }

        @keyframes barPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scaleY(0.8);
            }
            50% {
                opacity: 1;
                transform: scaleY(1.2);
                background: linear-gradient(180deg, #C0C0C0 0%, #FFD700 50%, #B87333 100%);
            }
        }

        /* Container para os textos */
        .text-container {
            text-align: center;
            margin-top: 15px;
        }

        /* Texto "CARREGANDO" */
        .loading-text {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            opacity: 0.8;
            animation: textGlow 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        /* Mensagem de boas-vindas */
        .welcome-message {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            animation-delay: 1s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #FFD700, #FFFFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes textGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        }

        /* ===== HARMONIZAÇÃO DAS CORES ===== */
        #uai {
            animation: uaiColors 3s ease-in-out;
            filter: drop-shadow(0 0 15px currentColor) brightness(1.3);
            animation-fill-mode: forwards;
        }

        #faixa {
            animation: faixaColors 3s ease-in-out;
            filter: drop-shadow(0 0 8px currentColor) brightness(1.1);
            animation-fill-mode: forwards;
        }

        #capoeira {
            animation: capoeiraColors 3s ease-in-out;
            filter: drop-shadow(0 0 5px currentColor);
            animation-fill-mode: forwards;
        }

        @keyframes uaiColors {
            0% { fill: #ffd700; }
            25% { fill: #ff6b6b; }
            50% { fill: #4ecdc4; }
            75% { fill: #ff9f1c; }
            100% { fill: #B71C1C; }
        }

        @keyframes faixaColors {
            0% { fill: #b8860b; }
            25% { fill: #8b3a3a; }
            50% { fill: #2c7a78; }
            75% { fill: #8b5a2b; }
            100% { fill: #8B1A1A; }
        }

        @keyframes capoeiraColors {
            0% { fill: #ffffff; }
            25% { fill: #f0f0f0; }
            50% { fill: #333333; }
            75% { fill: #ffffff; }
            100% { fill: #FEFEFE; }
        }

        /* Brilho pulsante no fundo */
        .logo-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            animation: glowPulse 2s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }
    </style>
</head>

<script>
    // Força a animação completa de 3 segundos
    const MIN_SPLASH_TIME = 3000;
    const startTime = Date.now();

    function removeSplash() {
        const splash = document.getElementById('splash-screen');
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => {
                if (splash && splash.parentNode) {
                    splash.parentNode.removeChild(splash);
                }
            }, 300);
        }
    }

    window.addEventListener('flutter-first-frame', function() {
        const elapsedTime = Date.now() - startTime;
        const remainingTime = Math.max(0, MIN_SPLASH_TIME - elapsedTime);
        setTimeout(removeSplash, remainingTime);
    });

    setTimeout(removeSplash, 6000);
</script>
